
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indira's AI Security Auditor - Indira University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              indira: {
                brand: '#006778', // University Teal
                gold: '#EAA400',  // University Gold (Rich)
                goldLight: '#DFCB4E', // Secondary Gold (Backgrounds)
                navy: '#003B49',  // Deep Navy/Teal
                dark: '#1e293b',  // Slate 800
                gray: '#64748b',  // Slate 500
                bg: '#f8fafc',    // Slate 50
                subtle: '#f1f5f9', // Slate 100
                border: '#e2e8f0' // Slate 200
              }
            },
            fontFamily: {
              uni: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-print-color-adjust: exact;
        }
        .uni-font {
            font-family: 'Playfair Display', serif;
        }
        
        /* Indira Brand Gradient */
        .brand-gradient {
            background: linear-gradient(135deg, #006778 0%, #003B49 100%);
        }
        
        .logo-box {
            width: 44px;
            height: 44px;
            background: #FFFFFF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .logo-symbol {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: #006778;
            font-size: 28px;
            line-height: 1;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background-color: #EAA400;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            right: 10px;
        }

        /* Scrollbar for dashboard panels */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #006778; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #004d5a; 
        }

        /* Toast Animation */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideInRight 0.3s ease-out forwards;
        }

        /* PRINT STYLES FOR REPORTS */
        @media print {
            @page { margin: 0; size: A4; }
            body { background: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-break-inside { break-inside: avoid; }
            .report-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important;
                max-width: 100% !important;
                padding: 40px !important;
            }
            main { margin-left: 0 !important; padding: 0 !important; overflow: visible !important; }
            /* Ensure colors print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/functions": "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
